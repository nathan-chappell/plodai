[project]
name = "report-foundry-backend"
version = "0.4.0"
description = "FastAPI backend for an agentic CSV reporting demo."
requires-python = ">=3.14"
dependencies = [
  "aiosqlite",
  "email-validator",
  "fastapi",
  "gunicorn",
  "itsdangerous",
  "openai",
  "openai-agents",
  "openai-chatkit",
  "bcrypt",
  "pydantic-settings",
  "python-multipart",
  "sqlalchemy",
  "typer",
  "uvicorn[standard]"
]

[project.optional-dependencies]
dev = [
  "httpx",
  "pytest",
  "ruff"
]

[build-system]
requires = ["setuptools>=80.0"]
build-backend = "setuptools.build_meta"
