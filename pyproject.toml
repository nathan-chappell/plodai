[project]
name = "ai-portfolio-backend"
version = "0.4.0"
description = "FastAPI backend for an agentic CSV reporting demo."
requires-python = ">=3.14"
dependencies = [
  "aiosqlite",
  "clerk-backend-api",
  "email-validator",
  "fastapi",
  "openai",
  "openai-agents",
  "openai-chatkit",
  "colorlog",
  "pydantic-settings",
  "python-multipart",
  "sqlalchemy",
  "typer",
  "uvicorn[standard]"
]

[project.optional-dependencies]
dev = [
  "httpx",
  "pytest",
  "ruff"
]

[build-system]
requires = ["setuptools>=80.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
fix = true

[tool.ruff.lint]
fixable = ["F401"]
